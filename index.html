<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Declaração de IR | Consultoria Gratuita</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a1f2b 0%, #123b4a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 28px;
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
      max-width: 440px;
      width: 100%;
      padding: 44px 32px;
      text-align: center;
    }

    .icon {
      font-size: 52px;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #0a1e2b;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .subtitle {
      color: #475569;
      font-size: 16px;
      margin-bottom: 34px;
      line-height: 1.6;
    }

    .input-group {
      margin-bottom: 22px;
      text-align: left;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: #1e293b;
      display: block;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    input {
      width: 100%;
      padding: 15px 18px;
      border: 1.5px solid #e2e8f0;
      border-radius: 16px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      transition: 0.2s ease;
      background: #f8fafc;
      outline: none;
    }

    input:focus {
      border-color: #c9a84c;
      background: white;
      box-shadow: 0 0 0 4px rgba(201, 168, 76, 0.15);
    }

    button {
      background: #c9a84c;
      color: #0a1f2b;
      border: none;
      padding: 17px;
      width: 100%;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 6px;
      transition: all 0.25s;
      letter-spacing: 0.4px;
    }

    button:hover {
      background: #b8952f;
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(201, 168, 76, 0.5);
    }

    .privacy {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .privacy span {
      font-size: 15px;
    }

    .privacy a {
      color: #c9a84c;
      text-decoration: none;
      font-weight: 600;
    }

    .privacy a:hover {
      text-decoration: underline;
    }

    .loading {
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📑</div>
    <h1>Declaração de IR sem estresse</h1>
    <p class="subtitle">
      Receba uma <strong>consultoria gratuita</strong> com especialistas e descubra como pagar menos imposto (ou aumentar sua restituição).
    </p>

    <!-- Formulário com redirecionamento via JavaScript -->
    <form id="form-captura">
      <div class="input-group">
        <label>Nome completo</label>
        <input type="text" name="nome" placeholder="Ex: João Silva" required>
      </div>
      <div class="input-group">
        <label>Melhor e-mail</label>
        <input type="email" name="email" placeholder="joao@email.com" required>
      </div>
      <button type="submit" id="submit-btn">Quero minha consultoria gratuita</button>
    </form>

    <div class="privacy">
      <span>🔒</span> Seus dados estão seguros. <a href="#">Política de Privacidade</a>
    </div>
  </div>

  <!-- Script de envio + redirecionamento -->
  <script>
    const form = document.getElementById('form-captura');
    const button = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault(); // impede o envio padrão

      // Desabilitar botão para evitar duplo envio
      button.classList.add('loading');
      button.textContent = 'Enviando...';

      const formData = new FormData(form);
      const data = {
        nome: formData.get('nome'),
        email: formData.get('email')
      };

      try {
        const response = await fetch('https://formspree.io/f/mlgvydol', {
          method: 'POST',
          headers: {
            'Accept': 'application/json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          // Redireciona para a página de obrigado
          window.location.href = 'https://minhadeclaracao.github.io/declaracao-ir/obrigado.html';
        } else {
          alert('Ocorreu um erro. Por favor, tente novamente.');
          button.classList.remove('loading');
          button.textContent = 'Quero minha consultoria gratuita';
        }
      } catch (error) {
        alert('Erro de conexão. Verifique sua internet e tente novamente.');
        button.classList.remove('loading');
        button.textContent = 'Quero minha consultoria gratuita';
      }
    });
  </script>
</body>
</html>
